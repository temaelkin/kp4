<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PNG Size to JSON</title>
</head>

<body>
    <form action="http://localhost:8080/size2json" method="POST" target="ifr" enctype="multipart/form-data">
        <label for="image">Изображение в PNG</label>
        <br>
        <input type="file" name="image">
        <br>
        <button type="submit">Отправить файл</button>
    </form>
    <iframe src="" name="ifr" frameborder="1" width="400" height="200"></iframe>
</body>

</html>
