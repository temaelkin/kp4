<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate Image</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .error {
            color: red;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #ffe0e0;
            border-radius: 4px;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        label {
            font-weight: bold;
        }
        input[type="number"],
        input[type="text"] {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        input[type="number"] {
            width: 150px;
        }
        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        .hint {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Generate Image with FLUX.1-schnell</h1>
    
    {% if message %}
    <div class="error">{{ message }}</div>
    {% endif %}
    
    <form method="POST" enctype="application/x-www-form-urlencoded">
        <div>
            <label for="width">Width:</label>
            <input type="number" id="width" name="width" required min="256" max="1024" step="32">
            <span class="hint">Multiple of 32, range 256-1024</span>
        </div>
        
        <div>
            <label for="height">Height:</label>
            <input type="number" id="height" name="height" required min="256" max="1024" step="32">
            <span class="hint">Multiple of 32, range 256-1024</span>
        </div>
        
        <div>
            <label for="text">Prompt:</label>
            <input type="text" id="text" name="text" required placeholder="Enter your prompt here">
        </div>
        
        <button type="submit">Generate Image</button>
    </form>
</body>
</html>
